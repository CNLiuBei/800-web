# 800 自研 SPA — 生产 Worker，绑定 guangying.org
name = "800-web"
main = "worker.ts"
compatibility_date = "2026-06-24"

[assets]
binding = "ASSETS"
directory = "."
not_found_handling = "single-page-application"
run_worker_first = true

[[services]]
binding = "API"
service = "800-api-worker"

[[routes]]
pattern = "guangying.org"
custom_domain = true

[[routes]]
pattern = "www.guangying.org"
custom_domain = true

[observability]
enabled = true
