<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Episodes 选集 Demo · Netflix 横向卡片</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html { color-scheme: dark; }
        body {
            margin: 0;
            font-family: "Netflix Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #141414;
            color: #fff;
        }
        button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

        .page { min-height: 100dvh; }

        /* 简化 Hero（选集区块在下方，与截图一致） */
        .hero-mini {
            position: relative;
            height: 42vh;
            min-height: 280px;
            background:
                linear-gradient(180deg, transparent 40%, #141414 100%),
                url("https://image.tmdb.org/t/p/original/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg") center / cover;
        }
        .hero-mini h1 {
            position: absolute; left: 4%; bottom: 1.5rem;
            margin: 0; font-size: 2rem; font-weight: 800;
            text-shadow: 0 2px 12px rgba(0,0,0,0.6);
        }

        /* ── Episodes 横向轮播（对齐截图） ── */
        .episodes-block {
            padding: 1.5rem 0 3rem;
        }
        .episodes-head {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            padding: 0 4%;
            margin-bottom: 0.85rem;
        }
        .episodes-head h2 {
            margin: 0;
            font-size: 1.45rem;
            font-weight: 700;
        }
        .season-pick {
            color: #a3a3a3;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .carousel-wrap {
            position: relative;
            padding: 0 4%;
        }
        .carousel {
            display: flex;
            gap: 0.65rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding: 0.25rem 0 0.5rem;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .ep-card {
            flex: 0 0 min(42vw, 320px);
            scroll-snap-align: start;
            background: #2f2f2f;
            border-radius: 8px;
            overflow: hidden;
            text-align: left;
            padding: 0;
            transition: transform 150ms, box-shadow 150ms;
        }
        .ep-card:hover { transform: scale(1.02); }
        .ep-card.active {
            box-shadow: 0 0 0 2px #fff;
        }

        .ep-card-thumb {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #222 center/cover no-repeat;
        }
        .ep-duration {
            position: absolute;
            right: 8px;
            bottom: 8px;
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.75);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .ep-progress {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
        }
        .ep-progress span {
            display: block;
            height: 100%;
            background: #e50914;
        }

        .ep-card-body { padding: 0.65rem 0.75rem 0.85rem; }
        .ep-card-title {
            margin: 0 0 0.45rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
        }
        .ep-card-desc {
            margin: 0;
            font-size: 0.82rem;
            line-height: 1.4;
            color: #a3a3a3;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 左右箭头（截图里的 pill 按钮） */
        .carousel-btn {
            position: absolute;
            top: 38%;
            transform: translateY(-50%);
            z-index: 2;
            width: 2.75rem;
            height: 7rem;
            border-radius: 4px;
            background: rgba(20, 20, 20, 0.65);
            color: #fff;
            display: grid;
            place-items: center;
            opacity: 0;
            transition: opacity 180ms, background 150ms;
        }
        .carousel-wrap:hover .carousel-btn { opacity: 1; }
        .carousel-btn:hover { background: rgba(20, 20, 20, 0.88); }
        .carousel-btn:disabled { opacity: 0 !important; cursor: default; }
        .carousel-btn svg { width: 1.25rem; height: 1.25rem; fill: currentColor; }
        .carousel-btn.prev { left: calc(4% - 0.5rem); }
        .carousel-btn.next { right: calc(4% - 0.5rem); }

        @media (max-width: 640px) {
            .ep-card { flex-basis: 78vw; }
            .carousel-btn {
                opacity: 1;
                width: 2.25rem;
                height: 5rem;
                background: rgba(20, 20, 20, 0.8);
            }
        }

        .demo-note {
            padding: 0.75rem 4% 2rem;
            font-size: 0.78rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero-mini">
            <h1>铁拳教育</h1>
        </div>

        <section class="episodes-block" aria-label="Episodes">
            <div class="episodes-head">
                <h2>Episodes</h2>
                <button type="button" class="season-pick" id="season-pick">
                    第 1 季
                    <svg width="10" height="6" viewBox="0 0 12 8" fill="currentColor"><path d="M1 1l5 5 5-5"/></svg>
                </button>
            </div>

            <div class="carousel-wrap">
                <button type="button" class="carousel-btn prev" id="btn-prev" aria-label="上一组">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <div class="carousel" id="carousel"></div>
                <button type="button" class="carousel-btn next" id="btn-next" aria-label="下一组">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59 13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                </button>
            </div>
        </section>

        <p class="demo-note">对齐 Netflix「Episodes」横向卡片轮播 · 缩略图 + 时长角标 + 标题 + 简介 · mock 数据</p>
    </div>

    <script>
        const EPISODES = [
            {
                n: 3,
                duration: '1h 12m',
                pct: 28,
                thumb: 'https://image.tmdb.org/t/p/w780/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg',
                desc: '面对公众对保护局的强烈抨击，罗华振与团队脱离组织，揭露了一个暴力校园帮派的致命阴谋。',
            },
            {
                n: 4,
                duration: '1h 8m',
                pct: 0,
                thumb: 'https://image.tmdb.org/t/p/w780/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg',
                desc: '罗华振与同事们开始适应各自的新角色，但保护局内部却暗流涌动，新的威胁正在酝酿。',
            },
            {
                n: 5,
                duration: '1h 6m',
                pct: 0,
                thumb: 'https://image.tmdb.org/t/p/w780/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg',
                desc: '校园内的权力结构发生动摇，一名学生的意外事件迫使所有人重新审视自己的立场。',
            },
            {
                n: 6,
                duration: '1h 9m',
                pct: 0,
                thumb: 'https://image.tmdb.org/t/p/w780/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg',
                desc: '毕业临近，过去与现在的矛盾集中爆发，每个人都必须做出无法回头的选择。',
            },
            {
                n: 7,
                duration: '1h 5m',
                pct: 0,
                thumb: 'https://image.tmdb.org/t/p/w780/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg',
                desc: 'Season finale 前奏：旧日恩怨浮出水面，保护局与学生站在同一条战线上。',
            },
            {
                n: 8,
                duration: '1h 11m',
                pct: 0,
                thumb: 'https://image.tmdb.org/t/p/w780/vyG93jhmPL7tBIhRtCLa5mdBKob.jpg',
                desc: '最终对决来临，罗华振必须在制度、友情与正义之间做出最后的抉择。',
            },
        ];

        let activeEp = 3;
        const carousel = document.getElementById('carousel');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function render() {
            carousel.innerHTML = EPISODES.map((ep) => {
                const bar = ep.pct > 0 && ep.pct < 100
                    ? `<div class="ep-progress"><span style="width:${ep.pct}%"></span></div>` : '';
                return `
                <button type="button" class="ep-card ${ep.n === activeEp ? 'active' : ''}" data-n="${ep.n}">
                    <div class="ep-card-thumb" style="background-image:url('${ep.thumb}')">
                        <span class="ep-duration">${ep.duration}</span>
                        ${bar}
                    </div>
                    <div class="ep-card-body">
                        <p class="ep-card-title">${ep.n}. 第 ${ep.n} 集</p>
                        <p class="ep-card-desc">${ep.desc}</p>
                    </div>
                </button>`;
            }).join('');
            updateButtons();
        }

        function scrollStep(dir) {
            const card = carousel.querySelector('.ep-card');
            const step = card ? card.offsetWidth + 10 : 330;
            carousel.scrollBy({ left: dir * step, behavior: 'smooth' });
        }

        function updateButtons() {
            const max = carousel.scrollWidth - carousel.clientWidth - 2;
            btnPrev.disabled = carousel.scrollLeft <= 2;
            btnNext.disabled = carousel.scrollLeft >= max;
        }

        carousel.addEventListener('click', (e) => {
            const card = e.target.closest('.ep-card');
            if (!card) return;
            activeEp = Number(card.dataset.n);
            render();
        });

        carousel.addEventListener('scroll', updateButtons, { passive: true });
        btnPrev.addEventListener('click', () => scrollStep(-1));
        btnNext.addEventListener('click', () => scrollStep(1));

        render();
        requestAnimationFrame(() => {
            const active = carousel.querySelector('.ep-card.active');
            active?.scrollIntoView({ behavior: 'instant', inline: 'start', block: 'nearest' });
            updateButtons();
        });
    </script>
</body>
</html>
